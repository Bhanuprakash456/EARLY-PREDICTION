<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>HeartGuard - AI Heart Disease Risk Prediction</title>
  <meta name="description" content="HeartGuard uses machine learning to predict heart disease risk and deliver personalized cardiac insights." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css" />

<body>
  <div class="auth-shell">
    <div class="auth-art">
      <div class="brand">
        <div class="brand-logo">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M12 21s-7-4.5-9.5-9A5.5 5.5 0 0 1 12 6a5.5 5.5 0 0 1 9.5 6c-2.5 4.5-9.5 9-9.5 9z"/></svg>
        </div>
        HeartGuard
      </div>
      <div class="heart-illustration">
        <svg viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <radialGradient id="hg" cx="50%" cy="40%" r="60%">
              <stop offset="0%" stop-color="#ff8a5b"/>
              <stop offset="60%" stop-color="#ff3b53"/>
              <stop offset="100%" stop-color="#8a0d24"/>
            </radialGradient>
          </defs>
          <path d="M200 340 C 90 250 40 180 60 120 C 75 75 130 60 170 95 C 185 108 195 122 200 140 C 205 122 215 108 230 95 C 270 60 325 75 340 120 C 360 180 310 250 200 340 Z" fill="url(#hg)"/>

        </svg>
      </div>
      <div class="art-caption">
        <h2>Know your heart. Live with confidence.</h2>
        <p>AI-powered cardiac risk insights, trusted by clinicians and individuals worldwide.</p>
      </div>
    </div>
    <div class="auth-form-wrap">
      <div class="auth-card fade-in">
        <h1>Welcome to HeartGuard</h1>
        <p class="sub">Sign in to track your cardiovascular health, or create a free account.</p>
        <a class="btn btn-primary btn-block" href="login.html">Sign in</a>
        <div style="height:10px"></div>
        <a class="btn btn-ghost btn-block" href="register.html">Create an account</a>

      </div>
    </div>
  </div>
  <script src="/static/script.js?v=2.0"></script>
