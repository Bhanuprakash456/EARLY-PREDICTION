<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Create account - HeartGuard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="auth-shell">
    <div class="auth-art">
      <div class="brand">
        <div class="brand-logo">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M12 21s-7-4.5-9.5-9A5.5 5.5 0 0 1 12 6a5.5 5.5 0 0 1 9.5 6c-2.5 4.5-9.5 9-9.5 9z"/></svg>
        </div>
        HeartGuard
      </div>
      <div class="heart-illustration">
        <svg viewBox="0 0 400 400" fill="none">
          <defs>
            <radialGradient id="hg" cx="50%" cy="40%" r="60%">
              <stop offset="0%" stop-color="#ff8a5b"/>
              <stop offset="60%" stop-color="#ff3b53"/>
              <stop offset="100%" stop-color="#8a0d24"/>
            </radialGradient>
          </defs>
          <path d="M200 340 C 90 250 40 180 60 120 C 75 75 130 60 170 95 C 185 108 195 122 200 140 C 205 122 215 108 230 95 C 270 60 325 75 340 120 C 360 180 310 250 200 340 Z" fill="url(#hg)"/>
          <path d="M70 200 H 150 L 165 165 L 195 245 L 220 180 L 240 215 L 270 200 H 330"
                stroke="white" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.95"/>
        </svg>
      </div>
      <div class="art-caption">
        <h2>Start your cardiac health journey.</h2>
        <p>Free, secure, and built with clinicians.</p>
      </div>
    </div>
    <div class="auth-form-wrap">
      <form id="registerForm" class="auth-card fade-in">
        <h1>Create your account</h1>
        <p class="sub">It only takes a minute.</p>
        <div id="authMessage" style="display:none; padding:12px; border-radius:8px; margin-bottom:16px; font-size:14px; text-align:center;"></div>
        <div class="field">
          <label for="name">Full Name</label>
          <input class="input" type="text" id="name" name="name" placeholder="Jane Doe" required />
        </div>
        <div class="field">
          <label for="email">Email</label>
          <input class="input" type="email" id="email" name="email" placeholder="you@email.com" required />
        </div>
        <div class="field">
          <label for="password">Password</label>
          <div style="position:relative">
            <input class="input" type="password" id="password" name="password" placeholder="At least 8 characters" required style="padding-right:40px;" />
            <button type="button" class="pwd-toggle" tabindex="-1" onclick="const p=document.getElementById('password'); p.type=p.type==='password'?'text':'password';" style="position:absolute; right:10px; top:50%; transform:translateY(-50%); background:none; border:none; color:#6b7180; cursor:pointer;">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            </button>
          </div>
        </div>
        <div class="field">
          <label for="confirm">Confirm password</label>
          <div style="position:relative">
            <input class="input" type="password" id="confirm" name="confirm" placeholder="Repeat password" required style="padding-right:40px;" />
            <button type="button" class="pwd-toggle" tabindex="-1" onclick="const p=document.getElementById('confirm'); p.type=p.type==='password'?'text':'password';" style="position:absolute; right:10px; top:50%; transform:translateY(-50%); background:none; border:none; color:#6b7180; cursor:pointer;">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            </button>
          </div>
        </div>
        <button type="submit" class="btn btn-primary btn-block">Create account</button>
        <p class="auth-foot">Already have an account? <a href="login.html">Sign in</a></p>
      </form>
    </div>
  </div>
  <script src="/static/script.js?v=4"></script>
</body>
</html>
