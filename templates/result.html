<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Prediction Result - HeartGuard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="app">
    <div id="sidebar-mount"></div>
    <main class="main">
      <div class="topbar">
        <div>
          <h1 style="margin:0">Prediction Result</h1>
          <p style="margin:4px 0 0">Generated by HeartGuard ML · Model v2.4</p>
        </div>
        <div class="topbar-actions">
          <a class="btn btn-ghost" href="assessment.html">New Assessment</a>
        </div>
      </div>

      <div class="result-wrap">
        <div class="glass gauge-card fade-in">
          <h3 style="margin-bottom:24px">10-year Cardiac Risk</h3>
          <div class="gauge">
            <svg width="260" height="260" viewBox="0 0 260 260">
              <defs>
                <linearGradient id="riskGrad" x1="0" x2="1" y1="0" y2="1">
                  <stop offset="0%" stop-color="#ff8a5b"/>
                  <stop offset="100%" stop-color="#ff3b53"/>
                </linearGradient>
              </defs>
              <circle class="circle-bg" cx="130" cy="130" r="108" stroke-width="18" fill="none"/>
              <circle class="circle-fill" cx="130" cy="130" r="108" stroke-width="18" fill="none"/>
            </svg>
            <div class="gauge-text">
              <div class="pct">0%</div>
              <div class="lbl">Predicted risk</div>
            </div>
          </div>
          <div class="risk-tag">Moderate Risk</div>
          <p style="margin-top:20px;font-size:13px">Based on the latest WHO/ESC cardiac risk scoring guidelines.</p>
        </div>

        <div class="glass recommend fade-in d1">
          <h3>Personalized Recommendations</h3>
          <p style="margin-bottom:8px">Small, evidence-based changes that can meaningfully reduce your risk.</p>
          <ul id="recommendations-list">
          </ul>
        </div>
      </div>
    </main>
  </div>
  <script src="/static/script.js?v=3.0"></script>
</body>
</html>
